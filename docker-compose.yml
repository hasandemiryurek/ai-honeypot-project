

services:
  hardhat-node:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: >
      sh -c "npm install --prefer-offline 2>/dev/null || npm install &&
             npx hardhat node --hostname 0.0.0.0"
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').connect(8545,'localhost',function(){process.exit(0)}).on('error',function(){process.exit(1)})\""]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 300s

  deployer:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - shared-data:/shared
    depends_on:
      hardhat-node:
        condition: service_healthy
    environment:
      - SHARED_DIR=/shared
      - RPC_URL=http://hardhat-node:8545
    command: >
      sh -c "npx hardhat compile &&
             npx hardhat run scripts/deploy.js --network localhost"
    restart: "no"

  ai-agent:
    build: .
    volumes:
      - .:/app
      - shared-data:/shared
    depends_on:
      deployer:
        condition: service_completed_successfully
    environment:
      - RPC_URL=http://hardhat-node:8545
      - SHARED_DIR=/shared
      - POLL_INTERVAL=2
    restart: unless-stopped

volumes:
  node_modules:
  shared-data: